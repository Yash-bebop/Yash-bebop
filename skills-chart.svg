<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8faff; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', monospace; font-size: 12px; fill: #57606a; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #0d1117; letter-spacing: 0.04em; text-transform: uppercase; }
      .pct { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; fill: #0d6efd; font-weight: 600; }

      .bar-track { fill: #e8f0fe; rx: 4; }

      .bar1 { animation: grow1 1.4s cubic-bezier(0.22,1,0.36,1) 0.3s both; transform-origin: left; }
      .bar2 { animation: grow2 1.4s cubic-bezier(0.22,1,0.36,1) 0.5s both; transform-origin: left; }
      .bar3 { animation: grow3 1.4s cubic-bezier(0.22,1,0.36,1) 0.7s both; transform-origin: left; }
      .bar4 { animation: grow4 1.4s cubic-bezier(0.22,1,0.36,1) 0.9s both; transform-origin: left; }
      .bar5 { animation: grow5 1.4s cubic-bezier(0.22,1,0.36,1) 1.1s both; transform-origin: left; }
      .row-reveal { animation: fadeIn 0.6s ease both; }
      .r1 { animation-delay: 0.3s; }
      .r2 { animation-delay: 0.5s; }
      .r3 { animation-delay: 0.7s; }
      .r4 { animation-delay: 0.9s; }
      .r5 { animation-delay: 1.1s; }

      @keyframes grow1 { from{scaleX(0)} from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes grow2 { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes grow3 { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes grow4 { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes grow5 { from{transform:scaleX(0)} to{transform:scaleX(1)} }
      @keyframes fadeIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

      .dot { animation: pulse 2.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a58ca"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#6ea8fe"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#084298"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>

  <rect width="900" height="180" rx="12" fill="#f8faff"/>

  <!-- Section label -->
  <text x="32" y="34" class="title">Languages at a Glance</text>
  <circle cx="24" cy="30" r="3.5" class="dot" fill="#0d6efd"/>

  <!-- Row 1: Python -->
  <g class="row-reveal r1">
    <text x="32" y="62" class="label">Python</text>
    <rect x="110" y="52" width="700" height="10" rx="5" fill="#e8f0fe"/>
    <rect x="110" y="52" width="294" height="10" rx="5" fill="url(#grad1)" class="bar1"/>
    <text x="820" y="62" class="pct">42%</text>
  </g>

  <!-- Row 2: TypeScript -->
  <g class="row-reveal r2">
    <text x="32" y="90" class="label">TypeScript</text>
    <rect x="110" y="80" width="700" height="10" rx="5" fill="#e8f0fe"/>
    <rect x="110" y="80" width="168" height="10" rx="5" fill="url(#grad2)" class="bar2"/>
    <text x="820" y="90" class="pct">24%</text>
  </g>

  <!-- Row 3: JavaScript -->
  <g class="row-reveal r3">
    <text x="32" y="118" class="label">JavaScript</text>
    <rect x="110" y="108" width="700" height="10" rx="5" fill="#e8f0fe"/>
    <rect x="110" y="108" width="112" height="10" rx="5" fill="url(#grad3)" class="bar3"/>
    <text x="820" y="118" class="pct">16%</text>
  </g>

  <!-- Row 4: C -->
  <g class="row-reveal r4">
    <text x="32" y="146" class="label">C</text>
    <rect x="110" y="136" width="700" height="10" rx="5" fill="#e8f0fe"/>
    <rect x="110" y="136" width="70" height="10" rx="5" fill="url(#grad4)" class="bar4"/>
    <text x="820" y="146" class="pct">10%</text>
  </g>

  <!-- Row 5: Other -->
  <g class="row-reveal r5">
    <text x="32" y="174" class="label">Other</text>
    <rect x="110" y="164" width="700" height="10" rx="5" fill="#e8f0fe"/>
    <rect x="110" y="164" width="56" height="10" rx="5" fill="url(#grad5)" class="bar5"/>
    <text x="820" y="174" class="pct">8%</text>
  </g>
</svg>
