<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8faff; }
      .card { fill: #ffffff; stroke: #dde7f5; stroke-width: 1; }
      .card-title { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #0d1117; }
      .card-issuer { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 10px; fill: #57606a; }
      .section-title { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; fill: #0d1117; letter-spacing: 0.06em; text-transform: uppercase; }
      .icon-bg-blue { fill: #e8f0fe; }
      .icon-blue { fill: #0d6efd; }

      .c1 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
      .c2 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.35s both; }
      .c3 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.5s both; }
      .c4 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.65s both; }
      .c5 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.8s both; }
      .c6 { animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.95s both; }
      .title-in { animation: cardIn 0.6s ease 0.1s both; }
      .shimmer { animation: shimmer 2.5s ease-in-out 2s infinite; }

      @keyframes cardIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
      @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.7} }

      .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }
      @keyframes dotPulse { 0%,100%{r:3.5} 50%{r:5} }
    </style>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
  </defs>

  <rect width="900" height="300" rx="12" fill="#f8faff"/>

  <!-- Section heading -->
  <g class="title-in">
    <circle cx="24" cy="30" r="3.5" class="dot-pulse icon-blue"/>
    <text x="36" y="34" class="section-title">Top Certifications</text>
  </g>

  <!-- Card 1: Google AI Professional -->
  <g class="c1" transform="translate(20, 52)">
    <rect width="264" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="264" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">🤖</text>
    <text x="52" y="28" class="card-title">Google AI Professional</text>
    <text x="52" y="42" class="card-issuer">Google · Feb 2026</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Applied AI · GenAI · Employer Consortium</text>
  </g>

  <!-- Card 2: Microsoft AI Agent -->
  <g class="c2" transform="translate(302, 52)">
    <rect width="264" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="264" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">⚙️</text>
    <text x="52" y="28" class="card-title">Applied Skills: Create an AI Agent</text>
    <text x="52" y="42" class="card-issuer">Microsoft · Feb 2026</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Azure AI Foundry · Agentic Systems</text>
  </g>

  <!-- Card 3: Anthropic Claude Code -->
  <g class="c3" transform="translate(584, 52)">
    <rect width="296" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="296" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">🔶</text>
    <text x="52" y="28" class="card-title">Claude Code in Action</text>
    <text x="52" y="42" class="card-issuer">Anthropic · Mar 2026</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Claude Code · MCP · Tool Use · Agentic Dev</text>
  </g>

  <!-- Card 4: AWS AI Practitioner -->
  <g class="c4" transform="translate(20, 148)">
    <rect width="264" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="264" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">☁️</text>
    <text x="52" y="28" class="card-title">AWS AI Practitioner</text>
    <text x="52" y="42" class="card-issuer">Amazon Web Services · Oct 2025</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Cloud AI · ML Foundations · AWS</text>
  </g>

  <!-- Card 5: McKinsey Forward -->
  <g class="c5" transform="translate(302, 148)">
    <rect width="264" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="264" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">📊</text>
    <text x="52" y="28" class="card-title">McKinsey Forward Program</text>
    <text x="52" y="42" class="card-issuer">McKinsey &amp; Company · Oct 2025</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Strategy · Problem Solving · 500K+ Alumni</text>
  </g>

  <!-- Card 6: Gemini for Developers -->
  <g class="c6" transform="translate(584, 148)">
    <rect width="296" height="82" rx="10" class="card"/>
    <rect x="0" y="0" width="296" height="3" rx="1.5" fill="url(#topBar)"/>
    <rect x="12" y="16" width="30" height="30" rx="8" class="icon-bg-blue"/>
    <text x="27" y="36" font-size="16" text-anchor="middle" font-family="sans-serif">✨</text>
    <text x="52" y="28" class="card-title">Gemini for Developers</text>
    <text x="52" y="42" class="card-issuer">Google DeepMind · May 2026</text>
    <text x="12" y="70" font-family="-apple-system,sans-serif" font-size="9.5" fill="#0d6efd">Gemini API · Multimodal AI · Dev Tooling</text>
  </g>

  <!-- Bottom note -->
  <text x="450" y="278" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#8c959f">+ Azure AI NLP · Vision · Document Intelligence · Google GenAI Leader · Duke Agile Specialization</text>
</svg>
