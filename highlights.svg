<svg width="900" height="130" viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 12.5px; font-weight: 600; fill: #0d1117; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 10.5px; fill: #57606a; }
      .num { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 26px; font-weight: 700; fill: #0d6efd; letter-spacing: -1px; }
      .card { fill: #ffffff; stroke: #dde7f5; stroke-width: 1; }
      .section-title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 11px; font-weight: 700; fill: #0d1117; letter-spacing: 0.06em; text-transform: uppercase; }

      .s1 { animation: countIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
      .s2 { animation: countIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.38s both; }
      .s3 { animation: countIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.56s both; }
      .s4 { animation: countIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.74s both; }
      .s5 { animation: countIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.92s both; }
      .title-in { animation: countIn 0.5s ease 0.1s both; }
      .dot-pulse { animation: dotPulse 2s ease-in-out infinite; }

      @keyframes countIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
      @keyframes dotPulse { 0%,100%{r:3.5} 50%{r:5.5} }
    </style>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#3d8bfd"/>
    </linearGradient>
  </defs>

  <rect width="900" height="130" rx="12" fill="#f8faff"/>

  <g class="title-in">
    <circle cx="24" cy="22" r="3.5" fill="#0d6efd" class="dot-pulse"/>
    <text x="36" y="26" class="section-title">Highlights</text>
  </g>

  <!-- Stat 1 -->
  <g class="s1" transform="translate(20, 40)">
    <rect width="156" height="74" rx="10" class="card"/>
    <rect x="0" y="0" width="156" height="3" rx="1.5" fill="url(#accentLine)"/>
    <text x="14" y="38" class="num">19%</text>
    <text x="14" y="55" class="label">IMC Global Rank</text>
    <text x="14" y="69" class="sub">18,809 teams · 117 countries</text>
  </g>

  <!-- Stat 2 -->
  <g class="s2" transform="translate(188, 40)">
    <rect width="156" height="74" rx="10" class="card"/>
    <rect x="0" y="0" width="156" height="3" rx="1.5" fill="url(#accentLine)"/>
    <text x="14" y="38" class="num">Top 15</text>
    <text x="14" y="55" class="label">PMx · IIT Guwahati</text>
    <text x="14" y="69" class="sub">National Finalist 2026</text>
  </g>

  <!-- Stat 3 -->
  <g class="s3" transform="translate(356, 40)">
    <rect width="162" height="74" rx="10" class="card"/>
    <rect x="0" y="0" width="162" height="3" rx="1.5" fill="url(#accentLine)"/>
    <text x="14" y="38" class="num">60+</text>
    <text x="14" y="55" class="label">Students Taught</text>
    <text x="14" y="69" class="sub">AI Instructor · 5+ countries</text>
  </g>

  <!-- Stat 4 -->
  <g class="s4" transform="translate(530, 40)">
    <rect width="162" height="74" rx="10" class="card"/>
    <rect x="0" y="0" width="162" height="3" rx="1.5" fill="url(#accentLine)"/>
    <text x="14" y="38" class="num">8.05</text>
    <text x="14" y="55" class="label">CGPA · Sem 1</text>
    <text x="14" y="69" class="sub">Doon University · CSE</text>
  </g>

  <!-- Stat 5 -->
  <g class="s5" transform="translate(704, 40)">
    <rect width="176" height="74" rx="10" class="card"/>
    <rect x="0" y="0" width="176" height="3" rx="1.5" fill="url(#accentLine)"/>
    <text x="14" y="38" class="num">99.73</text>
    <text x="14" y="55" class="label">CUET Percentile</text>
    <text x="14" y="69" class="sub">General Aptitude · 2025</text>
  </g>
</svg>
