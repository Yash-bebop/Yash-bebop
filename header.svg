<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8faff; }
      .name { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 42px; font-weight: 700; letter-spacing: -1.5px; fill: #0d1117; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; font-size: 15px; font-weight: 400; fill: #57606a; letter-spacing: 0.3px; }
      .accent { fill: #0d6efd; }
      .dot { fill: #0d6efd; }
      .line { stroke: #0d6efd; stroke-width: 3; stroke-linecap: round; }
      .cursor { fill: #0d6efd; animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .name-reveal { animation: slideRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
      .sub-reveal { animation: slideRight 0.9s cubic-bezier(0.22,1,0.36,1) 0.6s both; }
      .badge-reveal { animation: fadeUp 0.7s ease 1s both; }
      .line-reveal { animation: drawLine 1s ease 0.5s both; }
      .circle-pulse { animation: pulse 3s ease-in-out infinite; }
      .float1 { animation: float1 6s ease-in-out infinite; }
      .float2 { animation: float2 8s ease-in-out infinite 1s; }
      .float3 { animation: float3 7s ease-in-out infinite 2s; }
      .float4 { animation: float4 9s ease-in-out infinite 0.5s; }
      .glow-ring { animation: glowRing 4s ease-in-out infinite; }

      @keyframes slideRight { from{opacity:0;transform:translateX(-24px)} to{opacity:1;transform:translateX(0)} }
      @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
      @keyframes drawLine { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
      @keyframes pulse { 0%,100%{r:6} 50%{r:8} }
      @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4px,-8px)} }
      @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5px,-6px)} }
      @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(3px,7px)} }
      @keyframes float4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-4px,5px)} }
      @keyframes glowRing { 0%,100%{opacity:0.15;r:34} 50%{opacity:0.35;r:40} }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#f8faff"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#0a58ca"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <circle cx="60" cy="30" r="1.5" fill="#0d6efd"/>
    <circle cx="120" cy="30" r="1.5" fill="#0d6efd"/>
    <circle cx="180" cy="30" r="1.5" fill="#0d6efd"/>
    <circle cx="60" cy="80" r="1.5" fill="#0d6efd"/>
    <circle cx="120" cy="80" r="1.5" fill="#0d6efd"/>
    <circle cx="840" cy="50" r="1.5" fill="#0d6efd"/>
    <circle cx="840" cy="110" r="1.5" fill="#0d6efd"/>
    <circle cx="840" cy="170" r="1.5" fill="#0d6efd"/>
    <circle cx="780" cy="50" r="1.5" fill="#0d6efd"/>
    <circle cx="780" cy="110" r="1.5" fill="#0d6efd"/>
    <circle cx="780" cy="170" r="1.5" fill="#0d6efd"/>
  </g>

  <!-- Floating accent circles - top right decoration -->
  <g transform="translate(800, 50)">
    <circle class="glow-ring" cx="0" cy="0" r="34" fill="none" stroke="#0d6efd" stroke-width="1.5" opacity="0.15"/>
    <circle class="circle-pulse" cx="0" cy="0" r="6" fill="#0d6efd" opacity="0.9"/>
  </g>
  <g class="float1" transform="translate(845, 30)">
    <circle cx="0" cy="0" r="4" fill="#0d6efd" opacity="0.25"/>
  </g>
  <g class="float2" transform="translate(755, 80)">
    <circle cx="0" cy="0" r="3" fill="#0a58ca" opacity="0.2"/>
  </g>
  <g class="float3" transform="translate(860, 100)">
    <rect x="-4" y="-4" width="8" height="8" rx="2" fill="#0d6efd" opacity="0.18" transform="rotate(15)"/>
  </g>
  <g class="float4" transform="translate(740, 140)">
    <circle cx="0" cy="0" r="5" fill="#0d6efd" opacity="0.12"/>
  </g>

  <!-- Blue accent bar left -->
  <rect class="line-reveal" x="52" y="72" width="4" height="76" rx="2" fill="url(#blueGrad)" stroke-dasharray="200" stroke-dashoffset="200"/>

  <!-- Main name -->
  <text class="name name-reveal" x="72" y="118">Yashvardhan Dobhal</text>

  <!-- Subtitle -->
  <text class="sub sub-reveal" x="72" y="148">Agentic AI · Applied ML · Cybersecurity · Doon University</text>

  <!-- Blinking cursor after name area -->
  <rect class="cursor" x="72" y="160" width="3" height="16" rx="1"/>

  <!-- Badges row -->
  <g class="badge-reveal">
    <!-- Badge 1 -->
    <rect x="72" y="178" width="120" height="24" rx="12" fill="url(#pillGrad)"/>
    <text x="82" y="194" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="#0d6efd">&#x2022; Agentic AI</text>

    <!-- Badge 2 -->
    <rect x="200" y="178" width="110" height="24" rx="12" fill="url(#pillGrad)"/>
    <text x="210" y="194" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="#0d6efd">&#x2022; Google GSA</text>

    <!-- Badge 3 -->
    <rect x="318" y="178" width="148" height="24" rx="12" fill="url(#pillGrad)"/>
    <text x="328" y="194" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="#0d6efd">&#x2022; B.Tech CSE '29</text>

    <!-- Badge 4 -->
    <rect x="474" y="178" width="160" height="24" rx="12" fill="url(#pillGrad)"/>
    <text x="484" y="194" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="#0d6efd">&#x2022; IMC Top 19% Global</text>
  </g>
</svg>
